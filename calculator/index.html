<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator — Chetali Kumbhare</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Page loads with a fade-in via CSS class toggled in JS -->
  <div class="page-wrapper" id="pageWrapper">

    <main class="calculator-container">
      <h1 class="app-title">Calculator</h1>

      <!-- Display Section -->
      <div class="display-wrapper">
        <!-- Shows the current expression being typed -->
        <div class="expression" id="expression" aria-label="Current expression">0</div>
        <!-- Shows the live result or final answer -->
        <div class="result" id="result" aria-label="Result"></div>
      </div>

      <!-- History Panel (last 5 calculations) -->
      <div class="history-panel" id="historyPanel">
        <p class="history-label">History</p>
        <!-- Empty state message when no history exists -->
        <p class="history-empty" id="historyEmpty">No calculations yet. Start typing!</p>
        <ul class="history-list" id="historyList" aria-label="Calculation history"></ul>
      </div>

      <!-- Button Grid -->
      <div class="button-grid" role="group" aria-label="Calculator buttons">

        <!-- Row 1: Utility buttons -->
        <button class="btn btn-utility btn-wide" data-action="clear" aria-label="Clear all">C</button>
        <button class="btn btn-utility" data-action="backspace" aria-label="Backspace">⌫</button>
        <button class="btn btn-operator" data-action="operator" data-value="÷" aria-label="Divide">÷</button>

        <!-- Row 2 -->
        <button class="btn btn-number" data-action="number" data-value="7">7</button>
        <button class="btn btn-number" data-action="number" data-value="8">8</button>
        <button class="btn btn-number" data-action="number" data-value="9">9</button>
        <button class="btn btn-operator" data-action="operator" data-value="×" aria-label="Multiply">×</button>

        <!-- Row 3 -->
        <button class="btn btn-number" data-action="number" data-value="4">4</button>
        <button class="btn btn-number" data-action="number" data-value="5">5</button>
        <button class="btn btn-number" data-action="number" data-value="6">6</button>
        <button class="btn btn-operator" data-action="operator" data-value="-" aria-label="Subtract">−</button>

        <!-- Row 4 -->
        <button class="btn btn-number" data-action="number" data-value="1">1</button>
        <button class="btn btn-number" data-action="number" data-value="2">2</button>
        <button class="btn btn-number" data-action="number" data-value="3">3</button>
        <button class="btn btn-operator" data-action="operator" data-value="+" aria-label="Add">+</button>

        <!-- Row 5 -->
        <button class="btn btn-number btn-zero" data-action="number" data-value="0">0</button>
        <button class="btn btn-number" data-action="decimal" aria-label="Decimal point">.</button>
        <button class="btn btn-equals" data-action="equals" aria-label="Equals">=</button>

      </div>

      <!-- Keyboard hint -->
      <p class="keyboard-hint">Tip: You can also use your keyboard</p>

    </main>

    <footer class="site-footer">
      <p>Built by <span>Chetali Kumbhare</span></p>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
